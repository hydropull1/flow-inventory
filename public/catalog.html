<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalog — Product Scanner</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container">
      <nav class="top-nav">
        <a class="nav-link" href="/">Scanner</a>
        <a class="nav-link" href="/catalog.html">Catalog</a>
      </nav>

      <header class="header">
        <h1>Product Catalog</h1>
        <p class="subtitle">
          Manage the shared master catalog and your store-specific catalog.
          Scans check both when identifying products.
        </p>
      </header>

      <div class="store-bar">
        <label class="store-label" for="storeIdInput">Store ID</label>
        <input type="text" id="storeIdInput" class="store-input" placeholder="default" />
      </div>

      <div class="catalog-tabs">
        <button type="button" class="tab active" data-tier="master">Master catalog</button>
        <button type="button" class="tab" data-tier="store">Store catalog</button>
      </div>

      <section class="catalog-form">
        <h2 class="form-title" id="formTitle">Add to master catalog</h2>
        <form id="catalogForm">
          <input type="hidden" id="editId" value="" />
          <input type="hidden" id="editTier" value="" />
          <div class="form-row">
            <label>
              Brand
              <input type="text" id="brandInput" required placeholder="RAZ" />
            </label>
            <label>
              Flavor / variant
              <input type="text" id="flavorInput" required placeholder="Blue Razz Ice" />
            </label>
          </div>
          <label class="sku-label">
            SKU (optional)
            <input type="text" id="skuInput" placeholder="UPC or item code" />
          </label>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="saveBtn">Add product</button>
            <button type="button" class="btn btn-secondary hidden" id="cancelEditBtn">Cancel</button>
          </div>
        </form>
      </section>

      <section class="catalog-list-section">
        <p class="catalog-list-heading" id="listHeading">Master catalog</p>
        <ul class="catalog-list" id="catalogList"></ul>
      </section>
    </main>

    <script type="module" src="/catalog.js"></script>
  </body>
</html>
